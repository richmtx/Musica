<app-navbar></app-navbar>

<div class="contact-page">

    <!-- HERO -->
    <section class="contact-hero">
        <h1>
            <span>C</span><span>o</span><span>n</span><span>t</span><span>a</span><span>c</span><span>t</span>
        </h1>
        <p class="hero-subtitle">Let's talk about something interesting</p>
    </section>

    <!-- LAYOUT: info + form -->
    <div class="contact-layout reveal">

        <!-- Columna izquierda: información -->
        <div class="info-col">
            <div class="info-item">
                <span class="info-label">Email</span>
                <p class="info-value">
                    <a href="mailto:hello@studio.com">hello&#64;studio.com</a>
                </p>
            </div>
            <div class="info-item">
                <span class="info-label">Location</span>
                <p class="info-value">México</p>
            </div>
            <div class="info-item">
                <span class="info-label">Availability</span>
                <p class="info-value">Open to projects &amp; collaborations</p>
            </div>
            <div class="info-item">
                <span class="info-label">Elsewhere</span>
                <div class="social-row">
                    <a href="#" class="social-link">GitHub</a>
                    <a href="#" class="social-link">LinkedIn</a>
                    <a href="#" class="social-link">Instagram</a>
                </div>
            </div>
        </div>

        <!-- Columna derecha: formulario -->
        <div class="form-col">
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name">
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your&#64;email.com">
            </div>
            <div class="field">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="What's on your mind..."></textarea>
            </div>
            <button class="btn-submit" type="button">Send message</button>
        </div>

    </div>

    <!-- FOOTER DIVIDER -->
    <div class="section-divider">
        <span class="divider-text">fin</span>
    </div>

</div>
