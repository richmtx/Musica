<app-navbar></app-navbar>

<!-- Canvas oculto para extracción de color -->
<canvas #colorCanvas style="display:none"></canvas>

<div class="home-page" (keydown)="onKeydown($event)" tabindex="0">

    <!-- GRID DE ÁLBUMES -->
    <div class="albums-wrap">
        <div class="albums-grid">
            <div *ngFor="let album of albums; let i = index" class="album-cell"
                [class.active-cell]="panelOpen && currentIdx === i" (click)="openPanel(i)">
                <img [src]="album.img" [alt]="album.title" loading="lazy">
                <div class="album-hover">
                    <div class="ah-title">{{ album.title }}</div>
                    <div class="ah-artist">{{ album.artist }}</div>
                    <div class="ah-year">{{ album.year }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- PANEL MODAL -->
    <div class="panel-overlay" #panelEl [class.open]="panelOpen" (click)="closePanel()">
        <div class="panel-bg" [style.background]="panelBg"></div>

        <!-- Controles superiores -->
        <button class="panel-ctrl panel-expand" (click)="$event.stopPropagation(); toggleExpand()"
            [attr.aria-label]="expanded ? 'Contraer' : 'Expandir'" [title]="expanded ? 'Contraer' : 'Expandir'">

            <!-- Icono expandir -->
            <svg *ngIf="!expanded" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <line x1="21" y1="3" x2="14" y2="10"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>

            <!-- Icono contraer -->
            <svg *ngIf="expanded" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 14 10 14 10 20"></polyline>
                <polyline points="20 10 14 10 14 4"></polyline>
                <line x1="14" y1="10" x2="21" y2="3"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
        </button>

        <button class="panel-ctrl panel-close" (click)="$event.stopPropagation(); closePanel()" aria-label="Cerrar"
            title="Cerrar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
                <line x1="5" y1="5" x2="19" y2="19"></line>
                <line x1="19" y1="5" x2="5" y2="19"></line>
            </svg>
        </button>

        <div class="panel-inner" (click)="$event.stopPropagation()">

            <!-- Imagen grande -->
            <div class="panel-img-side">
                <img class="panel-album-img" [src]="current.img" [alt]="current.title">
            </div>

            <!-- Info -->
            <div class="panel-info-side">
                <span class="panel-num">{{ panelNum }}</span>
                <h2 class="panel-title">{{ current.title }}</h2>
                <p class="panel-artist">{{ current.artist }}</p>
                <p class="panel-year">{{ current.year }}</p>
                <div class="panel-divider"></div>
                <span class="panel-genre">{{ current.genre }}</span>

                <div class="panel-nav">
                    <button class="nav-btn" (click)="prev()">←</button>
                    <span class="nav-counter">{{ currentIdx + 1 }} of {{ albums.length }}</span>
                    <button class="nav-btn" (click)="next()">→</button>
                </div>
            </div>

        </div>
    </div>

</div>
